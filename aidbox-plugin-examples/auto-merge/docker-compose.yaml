services:
  # Standalone auto-merge handler app: Aidbox calls it on Patient/create, and it
  # runs $match + $merge against MDMbox. This is a long-running service.
  # The driver (run.py) is run separately from the host: `python3 run.py`.
  auto-merge-handler-app:
    image: python:3.12-slim
    pull_policy: always
    ports:
      - 3301:3301
    networks:
      - mdmbox-playground
    working_dir: /app
    volumes:
      - ./:/app:ro
    command: ["python", "auto_merge_handler_app.py"]
    environment:
      # Unbuffered stdout so `docker compose logs` shows request lines live.
      PYTHONUNBUFFERED: "1"
      WEBHOOK_PORT: "3301"
      # In-network service names (containers talk to each other directly).
      AIDBOX_URL: http://aidbox:8080
      AIDBOX_AUTH: "Basic cm9vdDpyb290"   # root:root
      MDMBOX_URL: http://mdmbox:3000
      MDMBOX_CLIENT_ID: mdmbox-automerge-client
      MDMBOX_CLIENT_SECRET: mdmbox-automerge-secret
      MODEL_ID: patient-example
      WEBHOOK_SECRET: aidbox-to-bun-secret

networks:
  mdmbox-playground:
    external: true
    name: mdmbox-playground
