services:
  mdmbox:
    image: healthsamurai/mdmbox:edge
    pull_policy: every_4w
    depends_on:
      aidbox-db:
        condition: service_healthy
    ports:
      - 3003:3000
    environment:
      MDMBOX_AUTH_ENABLED: "false"
      MDMBOX_UI_AUTH_ENABLED: "false"
      MDMBOX_HTTP_HOST: "0.0.0.0"
      BOX_DB_HOST: aidbox-db
      BOX_DB_PORT: "5432"
      BOX_DB_DATABASE: aidbox
      BOX_DB_USER: postgres
      BOX_DB_PASSWORD: postgres
      BOX_SETTINGS_MODE: read-write
      BOX_BOOTSTRAP_FHIR_PACKAGES: hl7.fhir.r4.core#4.0.1
      BOX_FHIR_BUNDLE_EXECUTION_VALIDATION_MODE: limited
      BOX_FHIR_COMPLIANT_MODE: "true"
      BOX_FHIR_CORRECT_AIDBOX_FORMAT: "true"
      BOX_FHIR_CREATEDAT_URL: https://aidbox.app/ex/createdAt
      BOX_FHIR_JSON_SCHEMA_DATETIME_REGEX: "#{:fhir-datetime}"
      BOX_FHIR_SCHEMA_VALIDATION: "true"
      BOX_FHIR_SEARCH_ENGINE: jsonpath
      BOX_FHIR_SEARCH_AUTHORIZE_INLINE_REQUESTS: "true"
      BOX_FHIR_SEARCH_CHAIN_SUBSELECT: "true"
      BOX_FHIR_SEARCH_COMPARISONS: "true"
      BOX_FHIR_SEARCH_INCLUDE_CONFORMANT: "true"
      BOX_FHIR_TERMINOLOGY_SERVICE_BASE_URL: https://tx.health-samurai.io/fhir
      BOX_FHIR_TERMINOLOGY_ENGINE: hybrid
      BOX_FHIR_TERMINOLOGY_ENGINE_HYBRID_EXTERNAL_TX_SERVER: https://tx.health-samurai.io/fhir
      BOX_SECURITY_DEV_MODE: "true"
      BOX_SECURITY_AUDIT_LOG_ENABLED: "true"
      BOX_ADMIN_PASSWORD: password
      BOX_ROOT_CLIENT_ID: root
      BOX_ROOT_CLIENT_SECRET: root

    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/healthz || exit 1
      interval: 5s
      timeout: 5s
      retries: 90
      start_period: 60s

  aidbox-db:
    image: docker.io/library/postgres:18
    pull_policy: every_4w
    ports:
      - "5439:5432"
    volumes:
      - "aidbox_pg_data:/data"
    environment:
      PGDATA: /data
      POSTGRES_USER: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: aidbox
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--data-checksums"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  aidbox:
    image: healthsamurai/aidboxone:latest
    pull_policy: every_4w
    depends_on:
      aidbox-db:
        condition: service_healthy
    ports:
      - 8888:8080
    environment:
      BOX_ADMIN_PASSWORD: password
      BOX_BOOTSTRAP_FHIR_PACKAGES: hl7.fhir.r4.core#4.0.1
      BOX_DB_DATABASE: aidbox
      BOX_DB_HOST: aidbox-db
      BOX_DB_PASSWORD: postgres
      BOX_DB_PORT: "5432"
      BOX_DB_USER: postgres
      BOX_FHIR_BUNDLE_EXECUTION_VALIDATION_MODE: limited
      BOX_FHIR_COMPLIANT_MODE: "true"
      BOX_FHIR_CORRECT_AIDBOX_FORMAT: "true"
      BOX_FHIR_CREATEDAT_URL: https://aidbox.app/ex/createdAt
      BOX_FHIR_JSON_SCHEMA_DATETIME_REGEX: "#{:fhir-datetime}"
      BOX_FHIR_SEARCH_ENGINE: jsonpath
      BOX_FHIR_SCHEMA_VALIDATION: "true"
      BOX_FHIR_SEARCH_AUTHORIZE_INLINE_REQUESTS: "true"
      BOX_FHIR_SEARCH_CHAIN_SUBSELECT: "true"
      BOX_FHIR_SEARCH_COMPARISONS: "true"
      BOX_FHIR_SEARCH_INCLUDE_CONFORMANT: "true"
      BOX_FHIR_TERMINOLOGY_ENGINE: hybrid
      BOX_FHIR_TERMINOLOGY_ENGINE_HYBRID_EXTERNAL_TX_SERVER: https://tx.health-samurai.io/fhir
      BOX_FHIR_TERMINOLOGY_SERVICE_BASE_URL: https://tx.health-samurai.io/fhir
      BOX_ROOT_CLIENT_ID: root
      BOX_ROOT_CLIENT_SECRET: root
      BOX_SECURITY_AUDIT_LOG_ENABLED: "true"
      BOX_SECURITY_DEV_MODE: "true"
      BOX_SETTINGS_MODE: read-write
      BOX_WEB_BASE_URL: http://localhost:8888
      BOX_WEB_PORT: 8080
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 90
      start_period: 30s

  notebook:
    image: oven/bun:1
    pull_policy: every_4w
    depends_on:
      mdmbox:
        condition: service_healthy
      aidbox:
        condition: service_healthy
    ports:
      - 3300:3300
    working_dir: /app
    volumes:
      - ./:/app:ro
    command: ["bun", "notebook.ts"]
    environment:
      PORT: "3300"
      # In-network service names (containers talk to each other directly).
      AIDBOX_URL: http://aidbox:8080
      PUBLIC_AIDBOX_URL: http://localhost:8888
      AIDBOX_AUTH: "Basic cm9vdDpyb290"   # root:root
      MDMBOX_URL: http://mdmbox:3000
      MODEL_ID: patient-mdl-default
      # URL Aidbox uses to reach this server over http-rpc (same compose network).
      APP_BASE_URL: http://notebook:3300

volumes:
  aidbox_pg_data: {}
